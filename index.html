<!DOCTYPE html>
<html>
    <head>
        <title>Music Hands</title>
    </head>
    <body>

        <div>
            <input type="range" id="bpmSlider" min="60" max="180" value="120">
             <label id="bpmLabel">120 BPM</label>
        </div>

        <div style="position: relative">
            <video id="webcam" style="display:none"></video>
            <canvas id="output" width="640" height="480"></canvas>
        </div>

        <button id="metronome">Metronome: Off</button>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
        <script>

            Tone.Transport.bpm.value = 120
            Tone.Transport.start()

            const bpmSlider = document.getElementById("bpmSlider")
            const bpmLabel = document.getElementById("bpmLabel")
            bpmSlider.addEventListener("input", function(){
                Tone.Transport.bpm.value = bpmSlider.value
                bpmLabel.textContent = bpmSlider.value + " BPM"
            })

            // synth setup
            
            const analyser = new Tone.Analyser("waveform", 2048).toDestination();
            const vol = new Tone.Volume(-60).connect(analyser);
            const tremolo = new Tone.Tremolo({
                frequency: 10,
                depth: 0.75,
                synced: true
            }).connect(vol).start();
            const filter = new Tone.Filter({
                type: "lowpass",
                frequency: 2000,
                rolloff: -24
            }).connect(tremolo);
            const reverb = new Tone.Reverb({
                decay: 3,
                wet: 0.5
            }).connect(filter);
            const synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: {type: "triangle"},
                envelope: {
                    attack: 0.005,
                    decay: 0.2,
                    sustain: 0.5,
                    release: 1
                }
            }).connect(reverb);

            const chords = {
                "1": ["C2","C3", "E3" ,"G3", "B3"],
                "2": ["D2","D3", "F3" ,"A3", "C4"],
                "3": ["E2", "E3", "G#3" ,"B3", "D4"],
                "4": ["F2", "F3", "A3" ,"C4", "E4"],
                "5": ["G2", "G3", "B3" ,"D4", "F4"],
                "6": ["A2", "A3", "C4" ,"E4", "G4"],
                "7": ["B2", "B3", "D4" ,"F4", "A4"],
                "8": ["C3", "C4", "E4" ,"G4", "B4"],
            }

            document.addEventListener("click",async function(event){
                await Tone.start()
            })
            
            document.addEventListener("keydown",async function(event){
                
                
                if (!event.repeat && chords[event.key]) {
                    const chord = chords[event.key]
                    synth.triggerAttack(chord)
                }
            })
            document.addEventListener("keyup",async function(event){
                if (chords[event.key]) {
                    synth.triggerRelease(chords[event.key])
                }
            })

                const click = new Tone.Synth({
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination()

                let metronomeOn = false
                let metronomeLoop = new Tone.Loop(time => {
                    click.triggerAttackRelease("C6", "32n", time)
                }, "4n")

                document.getElementById("metronome").addEventListener("click", function() {
                    metronomeOn = !metronomeOn
                    if (metronomeOn) {
                        metronomeLoop.start(0)
                        this.textContent = "Metronome: On"
                    } else {
                        metronomeLoop.stop()
                        this.textContent = "Metronome: Off"
                    }
                })
        </script>

        <script>
            const videoElement = document.getElementById("webcam")
            const canvasElement = document.getElementById("output")
            const ctx = canvasElement.getContext("2d")
            
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.2
            })
            
            function getDivisions() {
                const bps = Tone.Transport.bpm.value / 60
            const divisions = [
                {name: "1n", freq: bps * 1},
                {name: "8n", freq: bps * 2},
                {name: "16n", freq: bps * 4},
                {name: "32n", freq: bps * 8},
            ]
            return divisions
            }

            hands.onResults(function(results){
                if (results.multiHandLandmarks.length > 0) {
                   
                    const landmarks = results.multiHandLandmarks[0]
                    const diff = landmarks[8].y - landmarks[0].y
                    const speed = (diff + 0.5)  * 19 + 1
                    const closest = getDivisions().reduce((prev, curr) => {
                        return (Math.abs(curr.freq - speed) < Math.abs(prev.freq - speed) ? curr : prev)
                    })
                    tremolo.frequency.value = closest.name

                    const handHeight = landmarks[9].y
                    vol.volume.rampTo((0.5 - handHeight) * 30, 0.01)

                    const handX = landmarks[9].x
                    filter.frequency.value =(200 + (1- handX) * 3000)
                    console.log("filter freq:", filter.frequency.value) 

                } else {
                    vol.volume.rampTo(-60, 2)
                } 
                
                
            })

            function drawWave() {
                requestAnimationFrame(drawWave)
                const waveform = analyser.getValue()
                ctx.fillStyle = "rgba(0, 0, 0, 0.2)"
                ctx.fillRect(0, 0, canvasElement.width, canvasElement.height)
                ctx.beginPath()
                ctx.strokeStyle = "black"
                ctx.shadowBlur = 20
                ctx.shadowColor = "cyan"
                ctx.lineWidth = 2

                for (let i = 0; i < waveform.length; i++) {
                    const x = (i / waveform.length) * canvasElement.width
                    const y = (1 - (waveform[i] + 1) / 2) * canvasElement.height
                    if (i === 0) {
                        ctx.moveTo(x, y)
                    } else {
                        ctx.lineTo(x, y)
                    }
                }
                ctx.stroke()
                
            }
            drawWave()

            const camera = new Camera(videoElement, {
                onFrame: async function() {
                    await hands.send({image: videoElement})
                
                },
                width: 320,
                height: 240
            })
            camera.start()

        </script>
    </body>
</html>
